name: Build and Deploy SONiC Landscape

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Build and deploy landscape
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Restore cache
        uses: actions/cache@v4.2.3
        with:
          path: cache
          key: landscape2-cache-${{ github.run_id }}
          restore-keys: |
            landscape2-cache-

      - name: Install landscape2
        run: |
          curl -L \
            "https://github.com/cncf/landscape2/releases/download/v1.1.0/landscape2-x86_64-unknown-linux-gnu.tar.xz" \
            -o landscape2.tar.xz
          tar -xJf landscape2.tar.xz
          sudo mv landscape2 /usr/local/bin/landscape2
          landscape2 --version

      - name: Build landscape
        run: |
          landscape2 build \
            --data-file data.yml \
            --settings-file settings.yml \
            --guide-file guide.yml \
            --logos-path logos \
            --cache-dir cache \
            --output-dir build

      - name: Fix routing for GitHub Pages SPA
        run: cp build/index.html build/404.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4.7.3
        with:
          branch: gh-pages
          folder: build
          clean: true
