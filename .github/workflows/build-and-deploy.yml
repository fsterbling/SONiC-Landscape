name: Build and Deploy SONiC Landscape

on:
  push:
    branches:
      - main
  schedule:
    # Rebuild daily at 02:00 UTC to pick up any upstream logo/data changes
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Build and deploy landscape
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install landscape2
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/cncf/landscape2/releases/download/v1.1.0/landscape2-installer.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: cache
          key: landscape2-cache-${{ github.run_id }}
          restore-keys: |
            landscape2-cache-

      - name: Build landscape
        run: |
          landscape2 build \
            --data-file data.yml \
            --settings-file settings.yml \
            --guide-file guide.yml \
            --logos-path logos \
            --cache-dir cache \
            --output-dir build

      - name: Fix routing for GitHub Pages SPA
        # GitHub Pages serves 404.html for unknown paths;
        # copying index.html there makes client-side routes work correctly.
        run: cp build/index.html build/404.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build
          clean: true
