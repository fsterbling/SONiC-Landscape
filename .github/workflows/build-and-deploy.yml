name: Build and Deploy SONiC Landscape

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Build and deploy landscape
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Restore cache
        uses: actions/cache@v4.2.3
        with:
          path: cache
          key: landscape2-cache-${{ github.run_id }}
          restore-keys: |
            landscape2-cache-

      - name: Build landscape (via Docker)
        run: |
          mkdir -p build cache
          docker run --rm \
            -v "${{ github.workspace }}:/landscape" \
            -w /landscape \
            ghcr.io/cncf/landscape2:latest \
            build \
              --data-file data.yml \
              --settings-file settings.yml \
              --guide-file guide.yml \
              --logos-path logos \
              --cache-dir cache \
              --output-dir build

      - name: Fix routing for GitHub Pages SPA
        run: cp build/index.html build/404.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4.7.3
        with:
          branch: gh-pages
          folder: build
          clean: true
